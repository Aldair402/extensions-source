name: Build LectorTMO

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/es/lectortmo/**'
      - '.github/workflows/build-lectortmo.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore signingkey.jks \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
            
      - name: Build extension
        run: |
          ./gradlew :src:es:lectortmo:assembleRelease

      - name: Find APK
        run: |
          find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lectortmo-apk
          path: |
            **/*.apk
